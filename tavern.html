<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酒館</title>
    <style>
        body {
            background-color: #000; /* 背景顏色 */
        }
    </style>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 側邊欄 -->
    <div id="sidebar">
        <div class="sidebar-menu">
            <a href="character.html"><button>角色</button></a>
        </div>
    </div>

    <!-- 側邊欄開關按鈕 -->
    <button id="sidebar-toggle" onclick="toggleSidebar()">=</button>

    <!-- 主要內容區域 -->
    <div class="main-content">
        <h1>酒館</h1>
        <p>你走進了酒館，這裡是認識其他冒險者的好地方。</p>
        <p>目前資金：<span id="playerMoney"></span></p>
    
        <!-- 選單 -->
        <div class="menu" id="companion-list"></div>
        <a href="city.html"><button class="exit-button">離開</button></a>
    </div>

    <script src="script.js"></script>
    <script>
        // 同伴資料庫
        const companions = [
            { name: "雷恩", description: "擅長劍術的戰士", cost: 100, Con:10, Str:10, Dex:10 },
            { name: "莉娜", description: "精通魔法的法師", cost: 120, Con:10, Str:10, Dex:10 },
            { name: "傑克", description: "狡猾的盜賊", cost: 80, Con:10, Str:10, Dex:10 },
            { name: "艾莉絲", description: "擅長治療的牧師", cost: 90, Con:10, Str:10, Dex:10 },
            { name: "克勞斯", description: "使用弓箭的弓箭手", cost: 110, Con:10, Str:10, Dex:10 }
        ];
        
        window.onload = function() {
            let playerMoney = parseInt(localStorage.getItem("playerMoney")) || 0;
            document.getElementById('playerMoney').textContent = playerMoney;
            
            const menu = document.getElementById("companion-list");
            menu.innerHTML = "";

            let hiredCompanions = JSON.parse(localStorage.getItem("hiredCompanions")) || [];

            companions.forEach(companion => {
                if (Math.random() < 0.5) { // 50% 機率出現
                    let companionDiv = document.createElement("div");
                    companionDiv.classList.add("companion");
                    
                    let isHired = hiredCompanions.some(hired => hired.name === companion.name);
                    
                    companionDiv.innerHTML = `
                        <div class="columns-container">
                            <div class="columns-item">
                                <h3>${companion.name}</h3>
                                ${companion.description}
                            </div>
                            <div class="columns-price">
                                ${isHired ? 
                                    '<p class="note">雇用中</p>' 
                                    : 
                                    `<button onclick="hireCompanion('${companion.name}', ${companion.cost})">$${companion.cost} 雇用</button>`
                                }
                            </div>
                        </div>
                    `;
                    menu.appendChild(companionDiv);
                }
            });
        };

        function hireCompanion(name, cost) {
            let playerMoney = parseInt(localStorage.getItem("playerMoney")) || 0;
            if (playerMoney >= cost) {
                playerMoney -= cost;
                localStorage.setItem("playerMoney", playerMoney);
                document.getElementById('playerMoney').textContent = playerMoney;
        
                let hiredCompanions = JSON.parse(localStorage.getItem("hiredCompanions")) || [];
        
                // 找到這個同伴的資料
                let companion = companions.find(comp => comp.name === name);
        
                if (companion && !hiredCompanions.some(hired => hired.name === name)) {
                    // 添加同伴資料並設定初始的HP和MaxHP
                    let hiredCompanion = {
                        name: companion.name,
                        description: companion.description,
                        Con: companion.Con,
                        Str: companion.Str,
                        Dex: companion.Dex,
                        MaxHP: companion.Con, // MaxHP = Con
                        HP: companion.Con // 初始HP = Con
                    };

                    hiredCompanions.push(hiredCompanion);
                    localStorage.setItem("hiredCompanions", JSON.stringify(hiredCompanions));
                    location.reload(); // 重新加載頁面以隱藏按鈕和費用
                }
            } else {
                alert("金幣不足");
            }
        }
    </script>

</body>
</html>
