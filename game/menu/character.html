<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            background-color: #000;

        }
        
    </style>
</head>
<body>
    <!-- 返回按鈕 -->
    <div class="button-bar" id="buttonBar">
        <button class="note" onclick="goBack()"><span>〈 返回</span></button>
    </div>

    <div class="main-content">
        <h1>角色</h1>
        <!--<p>⭐ 名聲：<span id="playerFame"></span></p>-->
        <hr>

        <!-- 隊伍選單 -->
        <div id="member-list">
            <div class="column-container item">
                <!-- 主角資料 -->
                <div class="column top">
                    <div class="center background">
                        <span class="note" id="playerType"></span>
                        <h3 id="playerName"></h3>
                        <p class="hp"><span id="playerHP"></span> / <span id="playerMaxHP"></span></p>
                        <button onclick="showCharacterSheet('player')">🔎 查看</button>
                    </div>
                </div>
                <!-- 同伴1資料 -->
                <div class="column">
                    <div id="companion1" class="center background hide">
                        <span class="note" id="companion1-type"></span>
                        <h3 id="companion1-name">同伴 1</h3>
                        <p class="hp"><span id="companion1-HP"></span> / <span id="companion1-MaxHP"></span></p>
                        <button onclick="showCharacterSheet('companion1')">🔎 查看</button>
                        <button class="top" onclick="talk('companion1')">💬 交談</button>
                    </div>
                </div>
            </div>
            <div class="column-container item">
                <!-- 同伴2資料 -->
                <div class="column">
                    <div id="companion2" class="center background hide">
                        <span class="note" id="companion2-type"></span>
                        <h3 id="companion2-name">同伴 2</h3>
                        <p class="hp"><span id="companion2-HP"></span> / <span id="companion2-MaxHP"></span></p>
                        <button onclick="showCharacterSheet('companion2')">🔎 查看</button>
                        <button class="top" onclick="talk('companion2')">💬 交談</button>
                    </div>
                </div>

                <!-- 同伴3資料 -->
                <div class="column">
                    <div id="companion3" class="center background hide">
                        <span class="note" id="companion3-type"></span>
                        <h3 id="companion3-name">同伴 3</h3>
                        <p class="hp"><span id="companion3-HP"></span> / <span id="companion3-MaxHP"></span></p>
                        <button onclick="showCharacterSheet('companion3')">🔎 查看</button>
                        <button class="top" onclick="talk('companion3')">💬 交談</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../script.js"></script>
    <script>
    
        // 頁面載入時
        window.onload = function() {
            getPartyData(); // 讀取隊伍資料
            partyToTeamMember(); // 將主角和同伴加入隊伍
            //getPlayerFame(); // 讀取名聲
        };
        
        // 顯示角色詳情
        function showCharacterSheet(memberId) {
            // 轉跳到詳情頁面，並用 URL 參數傳遞角色 ID
            window.location.href = `characterSheet.html?memberId=${memberId}`;        
        }

        // 交談
        function talk(memberId) {
            // 轉跳到對話頁面，並用 URL 參數傳遞角色 ID
            window.location.href = `characterTalk.html?memberId=${memberId}`;
        }


    </script>

</body>
</html>
