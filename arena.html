<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅館</title>
    <style>
        body {
            background-color: #000; /* 背景顏色 */
        }

    </style>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 側邊欄 -->
    <div id="sidebar">
        <div class="sidebar-menu">
            <a href="character.html"><button>角色</button></a>
        </div>
    </div>

    <!-- 側邊欄開關按鈕 -->
    <button id="sidebar-toggle" onclick="toggleSidebar()">=</button>

    <!-- 主要內容區域 -->
    <div class="main-content">
        <h1>競技場</h1>
        <p>你來到了競技場。</p>
        <p>目前生命值：<span id="playerHP">100</span></p>

         <!-- 選單 -->
        <div class="menu">
            <a><button onclick="decreaseHP(30)">參加戰鬥</button></a>
        </div>
        <a href="city.html"><button class="exit-button">離開</button></a>
    </div>

    <script src="script.js"></script>
    <script>
        // 從 localStorage 讀取 HP
        window.onload = function() {
            let storedHP = localStorage.getItem('hp');
            if (storedHP) {
                document.getElementById('hp').textContent = storedHP;
            }
        };

    </script>
    
</body>
</html>
