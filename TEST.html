<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡單文字冒險遊戲</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 20px; }
        #gameText { margin-bottom: 20px; }
        button { margin: 5px; padding: 10px; }
    </style>
</head>
<body>

    <h1>文字冒險遊戲</h1>
    <p id="gameText">你站在一個岔路口，你要往哪邊走？</p>
    <button onclick="choose('left')">往左走</button>
    <button onclick="choose('right')">往右走</button>

    <script>
        function choose(direction) {
            let text = "";
            if (direction === 'left') {
                text = "你走進了森林，聽到狼的嚎叫...";
            } else if (direction === 'right') {
                text = "你來到了一座廢棄的城堡，門微微開著...";
            }
            document.getElementById("gameText").textContent = text;
        }
    </script>

</body>
</html>
