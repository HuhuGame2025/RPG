<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #000;

        }
        


    </style>
</head>
<body>
    <div class="main-content">
        <h1>角色</h1>

        <div class="columns-container">
            <!-- 顯示主角資料 -->
            <div class="columns-item">
                <h3><span id="playerName"></span></h3>
                <p><strong>HP　</strong><span id="playerHP"></span> / <span id="playerMaxHP"></span></p>
                <p><strong>體質：</strong><span id="playerCon"></span></p>
                <p><strong>力量：</strong><span id="playerStr"></span></p>
                <p><strong>敏捷：</strong><span id="playerDex"></span></p>
            </div>

            <!-- 顯示同伴1資料 -->
            <div id="companion1" class="columns-item hide">
                <h3 id="companion1-name">同伴 1</h3>
                <p><strong>HP　</strong><span id="companion1-HP"></span> / <span id="companion1-MaxHP"></span></p>
                <p><strong>體質：</strong><span id="companion1-Con">0</span></p>
                <p><strong>力量：</strong><span id="companion1-Str">0</span></p>
                <p><strong>敏捷：</strong><span id="companion1-Dex">0</span></p>
                </div>
        </div>
        <hr>
        <div class="columns-container">
            <!-- 顯示同伴2資料 -->
            <div id="companion2" class="columns-item hide">
                <h3 id="companion2-name">同伴 2</h3>
                <p><strong>HP　</strong><span id="companion2-HP"></span> / <span id="companion2-MaxHP"></span></p>
                <p><strong>體質：</strong><span id="companion2-Con">0</span></p>
                <p><strong>力量：</strong><span id="companion2-Str">0</span></p>
                <p><strong>敏捷：</strong><span id="companion2-Dex">0</span></p>
            </div>

            <!-- 顯示同伴3資料 -->
            <div id="companion3" class="columns-item hide">
                <h3 id="companion3-name">同伴 3</h3>
                <p><strong>HP　</strong><span id="companion3-HP"></span> / <span id="companion3-MaxHP"></span></p>
                <p><strong>體質：</strong><span id="companion3-Con">0</span></p>
                <p><strong>力量：</strong><span id="companion3-Str">0</span></p>
                <p><strong>敏捷：</strong><span id="companion3-Dex">0</span></p>
            </div>
        </div>
        <p><strong>金幣：</strong><span id="playerMoney"></span></p>
        <p><strong>名聲：</strong><span id="playerFame"></span></p>

        <button class="button" onclick="goBack()">返回</button>
    </div>

    <script src="script.js"></script>
    <script>
    
        // 頁面載入時，讀取隊伍資料
        window.onload = function() {
            getPartyData();
        };

        const playerFame = parseInt(localStorage.getItem("playerFame"));
        const playerMoney = parseInt(localStorage.getItem("playerMoney"));
        document.getElementById("playerFame").textContent = playerFame;
        document.getElementById("playerMoney").textContent = playerMoney;

    </script>

</body>
</html>
